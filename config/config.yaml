# RAG Data Pipeline Configuration
# ================================
# Generic configuration - not tied to any specific platform

# Pipeline Settings
pipeline:
  name: "my-rag-pipeline"
  version: "1.0.0"

# Crawler Configuration
crawler:
  delay: 1.0              # Seconds between requests
  max_retries: 3          # Retry failed requests
  timeout: 30             # Request timeout in seconds
  output_dir: "./data/raw"  # Where to save crawled content
  user_agent: "RAG-Data-Pipeline/1.0"

# Content Processing
processor:
  chunk_size: 1000        # Characters per chunk
  chunk_overlap: 200      # Overlap between chunks

# Vector Database
vector_store:
  db_path: "./chroma_db"
  collection_name: "documents"

# Sources to crawl (add your URLs here)
# Can be single URLs or patterns
sources:
  # Example:
  # - "https://docs.example.com/page1"
  # - "https://docs.example.com/page2"
  # Or load from file:
  # url_file: "urls.txt"

# Embedding Model (optional)
# If not specified, ChromaDB uses default
embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"  # or null for default
  device: "cpu"  # cpu or cuda
